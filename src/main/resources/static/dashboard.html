<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Resume Analyzer</title>
    <script>
if (!localStorage.getItem("user")) {
    window.location.href = "login.html";
}
</script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            margin: 0;
            padding: 0;
        }

        /* HEADER */
        .header {
            background: #1f4037;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
        }

        .logout-btn {
            background: #ff4d4d;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        /* MAIN CONTAINER */
        .container {
            width: 85%;
            margin: 30px auto;
        }

        /* CARD STYLE */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        h1 {
            text-align: center;
            color: #1f4037;
        }

        /* UPLOAD */
        .upload-box {
            text-align: center;
        }

        input[type="file"] {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #1f4037;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #14532d;
        }

        /* LOADER */
        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #1f4037;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .selected {
            color: green;
            font-weight: bold;
        }

        .rejected {
            color: red;
            font-weight: bold;
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            color: gray;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h2>📄 Smart Resume Analyzer</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

    <!-- UPLOAD CARD -->
    <div class="card">
        <h1>Analyze Resumes</h1>

        <div class="upload-box">
            <input type="file" id="resumeInput" multiple>
            <br>
            <button onclick="uploadFiles()">Analyze</button>
        </div>

        <div class="loader" id="loader">
            ⏳ Processing resumes...
        </div>
    </div>

    <!-- RESULT CARD -->
    <div class="card">
        <h1>Results</h1>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>Resume Name</th>
                    <th>Match %</th>
                    <th>Status</th>
                    <th>Missing Skills</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="empty" id="emptyMsg">
            No resumes analyzed yet.
        </div>
    </div>

</div>

<script>

function logout() {
    // for now just redirect
    window.location.href = "/login.html";
}

async function uploadFiles() {

    const input = document.getElementById("resumeInput");
    const files = input.files;

    if (files.length === 0) {
        alert("Please upload at least one resume");
        return;
    }

    document.getElementById("loader").style.display = "block";
    document.getElementById("emptyMsg").style.display = "none";

    const formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    try {
        const response = await fetch("/api/resume/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        const tableBody = document.querySelector("#resultTable tbody");
        tableBody.innerHTML = "";

        data.forEach(resume => {

            let statusClass = resume.status === "SELECTED" ? "selected" : "rejected";

            const row = `
                <tr>
                    <td>${resume.fileName}</td>
                    <td>${resume.percentage.toFixed(2)}%</td>
                    <td class="${statusClass}">${resume.status}</td>
                    <td>${resume.missingSkills}</td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });

    } catch (error) {
        alert("Error occurred while analyzing resumes");
        console.error(error);
    }

    document.getElementById("loader").style.display = "none";
}

</script>

</body>
</html>
