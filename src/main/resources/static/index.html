<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .result-box {
            margin-top: 20px;
        }

        .skill {
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-lg text-center" style="width: 400px;">

        <h3 class="mb-3">📄 Resume Analyzer</h3>

        <input type="file" id="file" class="form-control mb-3">

        <button class="btn btn-primary w-100" onclick="upload()">Analyze Resume</button>

        <!-- Loading -->
        <div id="loading" class="mt-3" style="display:none;">
            <div class="spinner-border text-primary"></div>
            <p>Analyzing...</p>
        </div>

        <!-- Result -->
        <div id="result" class="result-box"></div>

    </div>

</div>

<script>

function upload() {

    let fileInput = document.getElementById("file");
    let resultDiv = document.getElementById("result");
    let loading = document.getElementById("loading");

    if (fileInput.files.length === 0) {
        alert("Please upload a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    loading.style.display = "block";
    resultDiv.innerHTML = "";

    fetch("/api/resume/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        loading.style.display = "none";

        resultDiv.innerHTML = `
            <h5 class="mt-3">Match Score</h5>

            <div class="progress">
                <div class="progress-bar bg-success" 
                     style="width:${data.percentage}%">
                    ${data.percentage.toFixed(2)}%
                </div>
            </div>

            <p class="mt-2">Matched Skills: ${data.matched}/${data.total}</p>

            <h6>Missing Skills:</h6>

            <div>
                ${data.missingSkills.map(skill => 
                    `<span class="badge bg-danger skill">${skill}</span>`
                ).join("")}
            </div>
        `;
    })
    .catch(err => {
        loading.style.display = "none";
        resultDiv.innerHTML = "<p class='text-danger'>Error analyzing resume</p>";
    });
}

</script>

</body>
</html>
