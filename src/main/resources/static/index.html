<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .main-title {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .badge {
            font-size: 14px;
        }

        .result-card {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div>
        <h2 class="main-title">🚀 AI Resume Analyzer</h2>

        <div class="card p-4 shadow-lg text-center" style="width:400px">

            <input type="file" id="file" class="form-control mb-3">

            <button onclick="upload()" class="btn btn-primary w-100">
                Analyze Resume
            </button>

            <!-- Loading -->
            <div id="loading" style="display:none" class="mt-3">
                <div class="spinner-border text-light"></div>
                <p>Analyzing...</p>
            </div>

            <!-- Result -->
            <div id="result"></div>

        </div>
    </div>

</div>

<script>

function upload() {

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Please upload a resume!");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    fetch("/api/resume/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("loading").style.display = "none";

        let missingSkillsHTML = data.missingSkills.length > 0
            ? data.missingSkills.map(skill =>
                `<span class="badge bg-danger m-1">${skill}</span>`
              ).join("")
            : "<span class='text-success'>No missing skills 🎉</span>";

        document.getElementById("result").innerHTML = `
            <div class="result-card text-start mt-3">

                <h5>📊 Match Score</h5>

                <div class="progress mb-2">
                    <div class="progress-bar bg-success"
                        style="width:${data.percentage}%">
                        ${data.percentage.toFixed(2)}%
                    </div>
                </div>

                <p><b>Matched Skills:</b> ${data.matched} / ${data.total}</p>

                <h6>❌ Missing Skills:</h6>
                <div>${missingSkillsHTML}</div>

            </div>
        `;
    })
    .catch(err => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").innerHTML =
            "<p class='text-danger'>Error analyzing resume</p>";
    });
}

</script>

</body>
</html>
