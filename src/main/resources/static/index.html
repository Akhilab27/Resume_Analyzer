<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Resume Analyzer</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 85%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #1f4037;
            margin-bottom: 20px;
        }

        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="file"] {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #1f4037;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #14532d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #1f4037;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .selected {
            color: green;
            font-weight: bold;
        }

        .rejected {
            color: red;
            font-weight: bold;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>📄 Smart Resume Analyzer</h1>

    <div class="upload-box">
        <input type="file" id="resumeInput" multiple>
        <br>
        <button onclick="uploadFiles()">Analyze Resumes</button>
    </div>

    <div class="loader" id="loader">
        ⏳ Analyzing resumes... Please wait
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Resume Name</th>
                <th>Match %</th>
                <th>Status</th>
                <th>Missing Skills</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script>

async function uploadFiles() {

    const input = document.getElementById("resumeInput");
    const files = input.files;

    if (files.length === 0) {
        alert("Please upload at least one resume");
        return;
    }

    const loader = document.getElementById("loader");
    loader.style.display = "block";

    const formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    try {
        const response = await fetch("http://localhost:8080/api/resume/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        const tableBody = document.querySelector("#resultTable tbody");
        tableBody.innerHTML = "";

        data.forEach(resume => {

            let statusClass = resume.status === "SELECTED" ? "selected" : "rejected";

            const row = `
                <tr>
                    <td>${resume.fileName}</td>
                    <td>${resume.percentage.toFixed(2)}%</td>
                    <td class="${statusClass}">${resume.status}</td>
                    <td>${resume.missingSkills}</td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });

    } catch (error) {
        alert("Error occurred while analyzing resumes");
        console.error(error);
    }

    loader.style.display = "none";
}

</script>

</body>
</html>
