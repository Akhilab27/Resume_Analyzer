<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Resume Analyzer</title>

    <!-- ✅ Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .result-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- 🔥 Title -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Smart Resume Analyzer</h2>
        <p class="text-muted">Upload your resume and analyze your skills</p>
    </div>

    <!-- 📄 Upload Card -->
    <div class="card shadow p-4">
        <div class="mb-3">
            <label class="form-label">Upload Resume (PDF)</label>
            <input type="file" id="fileInput" class="form-control">
        </div>

        <button class="btn btn-primary w-100" onclick="uploadResume()">
            Analyze Resume
        </button>
    </div>

    <!-- 📊 Result Section -->
    <div class="card shadow p-4 mt-4" id="resultSection" style="display:none;">
        <h4 class="mb-3">Analysis Result</h4>

        <div class="result-box">
            <p><strong>Matched Skills:</strong> <span id="matched"></span></p>
            <p><strong>Total Skills:</strong> <span id="total"></span></p>

            <!-- Progress Bar -->
            <p><strong>Match Percentage:</strong></p>
            <div class="progress mb-3">
                <div id="progressBar" class="progress-bar" role="progressbar"></div>
            </div>

            <p><strong>Missing Skills:</strong></p>
            <ul id="missingSkills"></ul>
        </div>
    </div>

</div>

<script>
function uploadResume() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    fetch("/api/resume/analyze", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        // Show section
        document.getElementById("resultSection").style.display = "block";

        // Set values
        document.getElementById("matched").innerText = data.matched;
        document.getElementById("total").innerText = data.total;

        // Progress bar
        const percent = data.percentage.toFixed(2);
        const progressBar = document.getElementById("progressBar");
        progressBar.style.width = percent + "%";
        progressBar.innerText = percent + "%";

        // Missing skills
        const list = document.getElementById("missingSkills");
        list.innerHTML = "";
        data.missingSkills.forEach(skill => {
            const li = document.createElement("li");
            li.innerText = skill;
            list.appendChild(li);
        });
    })
    .catch(error => {
        console.error(error);
        alert("Error occurred");
    });
}
</script>

</body>
</html>
